# Banking TTS — Voice Configuration
#
# This file controls which XTTS v2 built-in voices are shown in the UI.
# Changes take effect on server restart.
#
# Fields:
#   id      — must match the XTTS v2 built-in speaker name exactly (case-sensitive)
#   name    — short display name shown in the UI
#   gender  — female | male
#   enabled — set to false to hide without deleting the entry
#   default — set to true on ONE voice to pre-select it on page load

voices:
  # ── Female voices ──────────────────────────────────────────────────────────
  - id: "Claribel Dervla"
    name: "Claribel"
    gender: female
    enabled: true
    default: true

