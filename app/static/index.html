<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banking TTS — Announcement System</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #e2e8f0;
        padding: 24px;
      }

      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 40px 44px;
        width: 100%;
        max-width: 580px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      }

      /* ── Logo ──────────────────────────────────────────────────── */
      .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
      .logo-icon {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        border-radius: 8px;
        display: grid; place-items: center;
        font-size: 18px;
      }
      .logo-text { font-size: 18px; font-weight: 700; color: #f1f5f9; }
      .logo-sub  { font-size: 11px; color: #64748b; letter-spacing: 0.5px; text-transform: uppercase; }

      h1       { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
      .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

      label {
        display: block;
        font-size: 12px; font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase; letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      input[type="text"], select {
        width: 100%;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 15px; color: #f1f5f9;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 18px;
      }
      input[type="text"]:focus, select:focus { border-color: #3b82f6; }
      input[type="text"]::placeholder { color: #475569; }
      select option { background: #1e293b; }

      .row { display: flex; gap: 14px; }
      .row > div { flex: 1; }

      /* ── Collapsible section headers ───────────────────────────── */
      .section-toggle {
        display: flex; align-items: center; justify-content: space-between;
        cursor: pointer;
        padding: 10px 14px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        user-select: none;
        transition: border-color 0.2s;
        margin-bottom: 0;
      }
      .section-toggle:hover { border-color: #3b82f6; }
      .section-toggle-left {
        display: flex; align-items: center; gap: 8px;
        font-size: 13px; font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .section-chevron {
        font-size: 13px; color: #475569;
        transition: transform 0.25s;
      }
      .section-chevron.open { transform: rotate(180deg); }

      .section-panel {
        background: #0f172a;
        border: 1px solid #334155;
        border-top: none;
        border-radius: 0 0 8px 8px;
        padding: 16px 16px 12px;
        display: none;
      }
      .section-panel.open { display: block; }

      .section-spacer { height: 8px; }

      /* ── Gender filter tabs ─────────────────────────────────────── */
      .gender-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
      .gtab {
        padding: 5px 14px;
        border: 1px solid #334155; border-radius: 20px;
        background: transparent;
        color: #64748b; font-size: 12px; font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        width: auto; margin: 0;
      }
      .gtab.active  { border-color: #3b82f6; color: #93c5fd; background: rgba(59,130,246,0.1); }
      .gtab:hover:not(.active) { border-color: #475569; color: #94a3b8; }

      /* ── Voice grid ─────────────────────────────────────────────── */
      .voice-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        gap: 8px;
        max-height: 224px;
        overflow-y: auto;
        padding-right: 2px;
      }
      .voice-grid::-webkit-scrollbar { width: 4px; }
      .voice-grid::-webkit-scrollbar-track { background: transparent; }
      .voice-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

      .voice-card {
        border: 1px solid #334155; border-radius: 8px;
        padding: 10px 10px 8px;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        background: #1e293b;
      }
      .voice-card:hover    { border-color: #475569; }
      .voice-card.selected { border-color: #3b82f6; background: rgba(59,130,246,0.08); }

      .vc-top { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
      .vc-gender-icon       { font-size: 13px; color: #64748b; }
      .vc-gender-icon.female { color: #f472b6; }
      .vc-gender-icon.male   { color: #60a5fa; }
      .vc-name {
        font-size: 12px; font-weight: 600; color: #e2e8f0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      }
      .vc-preview {
        width: 100%; padding: 4px 0;
        font-size: 11px; font-weight: 600;
        background: #0f172a;
        border: 1px solid #334155; border-radius: 4px;
        color: #64748b;
        cursor: pointer;
        transition: all 0.2s;
        margin: 0;
      }
      .vc-preview:hover:not(:disabled) { border-color: #3b82f6; color: #93c5fd; }
      .vc-preview:disabled { opacity: 0.5; cursor: not-allowed; }
      .vc-preview.playing  { border-color: #22c55e; color: #86efac; }

      .voice-loading, .voice-empty {
        grid-column: 1 / -1;
        padding: 24px 0;
        text-align: center;
        font-size: 13px; color: #475569;
      }

      .selected-badge { margin-top: 10px; font-size: 12px; color: #64748b; }
      .selected-badge strong { color: #93c5fd; }

      /* ── Prosody sliders ─────────────────────────────────────────── */
      .slider-row {
        display: grid;
        grid-template-columns: 52px 1fr 56px;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .slider-row:last-child { margin-bottom: 4px; }
      .slider-label  { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; }
      .slider-value  { font-size: 12px; font-weight: 600; color: #93c5fd; text-align: right; font-variant-numeric: tabular-nums; }

      input[type="range"] {
        -webkit-appearance: none; appearance: none;
        width: 100%; height: 4px;
        background: #334155; border-radius: 2px;
        outline: none; border: none; padding: 0; margin: 0; cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px; height: 16px;
        background: #3b82f6; border-radius: 50%; cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }
      input[type="range"]::-webkit-slider-thumb:hover { background: #60a5fa; transform: scale(1.15); }
      input[type="range"]::-moz-range-thumb {
        width: 16px; height: 16px;
        background: #3b82f6; border-radius: 50%; border: none; cursor: pointer;
      }

      .prosody-reset {
        font-size: 11px; color: #475569;
        cursor: pointer; padding: 2px 8px;
        border: 1px solid #334155; border-radius: 4px;
        background: transparent; width: auto; margin: 0;
        transition: color 0.2s, border-color 0.2s;
      }
      .prosody-reset:hover { color: #94a3b8; border-color: #475569; }

      /* ── Generate button ─────────────────────────────────────────── */
      button#btn {
        width: 100%; padding: 12px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        border: none; border-radius: 8px;
        font-size: 15px; font-weight: 600; color: #fff;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        margin-top: 14px;
      }
      button#btn:hover:not(:disabled) { opacity: 0.9; }
      button#btn:active:not(:disabled) { transform: scale(0.98); }
      button#btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* ── Status bar ──────────────────────────────────────────────── */
      .status {
        display: flex; align-items: center; gap: 10px;
        margin-top: 22px; padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px; font-weight: 500;
        min-height: 44px;
        transition: background 0.3s;
        visibility: hidden;
      }
      .status.show    { visibility: visible; }
      .status.loading { background: #1e3a5f; color: #93c5fd; }
      .status.success { background: #14532d; color: #86efac; }
      .status.error   { background: #450a0a; color: #fca5a5; }

      .spinner {
        width: 16px; height: 16px;
        border: 2px solid currentColor; border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Audio / text output ─────────────────────────────────────── */
      .player-wrap { margin-top: 18px; display: none; }
      .player-wrap.show { display: block; }
      .player-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
      audio { width: 100%; border-radius: 8px; accent-color: #3b82f6; }

      .text-preview {
        margin-top: 14px; padding: 12px 14px;
        background: #0f172a;
        border: 1px solid #1e3a5f; border-radius: 8px;
        font-size: 13px; color: #93c5fd; line-height: 1.5;
        display: none;
      }
      .text-preview.show { display: block; }
      .text-preview strong { display: block; font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <div class="card">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">🔊</div>
        <div>
          <div class="logo-text">Banking TTS</div>
          <div class="logo-sub">Offline Announcement System</div>
        </div>
      </div>

      <h1>Queue Announcement</h1>
      <p class="subtitle">Select a voice, fill in the token and counter number, then generate.</p>

      <!-- Token + Counter -->
      <div class="row">
        <div>
          <label for="token">Token Number</label>
          <input id="token" type="text" placeholder="e.g. A13" maxlength="20" default="A13" />
        </div>
        <div>
          <label for="counter">Counter Number</label>
          <input id="counter" type="text" placeholder="e.g. 23" maxlength="10" default="24" />
        </div>
      </div>

      <!-- Language -->
      <label for="language">Language</label>
      <select id="language" onchange="onLanguageChange()" style="margin-bottom: 12px">
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Spanish</option>
        <option value="ar">🇸🇦 Arabic</option>
        <option value="zh">🇨🇳 Chinese</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="fr">🇫🇷 French</option>
      </select>

      <!-- ── Voice Browser ──────────────────────────────────────────── -->
      <div class="section-toggle" onclick="toggleSection('voice')">
        <div class="section-toggle-left"><span>🎙</span> Voice Selection</div>
        <span class="section-chevron open" id="voice-chevron">▼</span>
      </div>
      <div class="section-panel open" id="voice-panel">
        <div class="gender-tabs">
          <button class="gtab active" onclick="filterVoices('all', this)">All</button>
          <button class="gtab" onclick="filterVoices('female', this)">♀ Female</button>
          <button class="gtab" onclick="filterVoices('male', this)">♂ Male</button>
        </div>
        <div class="voice-grid" id="voice-grid">
          <div class="voice-loading">Loading voices…</div>
        </div>
        <div class="selected-badge">Selected: <strong id="selected-voice-name">—</strong></div>
        <input type="hidden" id="selected-voice-id" value="" />
      </div>

      <div class="section-spacer"></div>

      <!-- ── Prosody ───────────────────────────────────────────────── -->
      <div class="section-toggle" onclick="toggleSection('prosody')">
        <div class="section-toggle-left"><span>⚙</span> Prosody Settings</div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="prosody-reset" onclick="event.stopPropagation();resetProsody()">Reset</button>
          <span class="section-chevron" id="prosody-chevron">▼</span>
        </div>
      </div>
      <div class="section-panel" id="prosody-panel">
        <div class="slider-row">
          <span class="slider-label">Speed</span>
          <input type="range" id="speed" min="0.5" max="2.0" step="0.05" value="1.0"
                 oninput="updateSlider('speed','speed-val',v=>v.toFixed(2)+'×')" />
          <span class="slider-value" id="speed-val">1.00×</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">Pitch</span>
          <input type="range" id="pitch" min="-12" max="12" step="0.5" value="0"
                 oninput="updateSlider('pitch','pitch-val',v=>(v>=0?'+':'')+v.toFixed(1)+' st')" />
          <span class="slider-value" id="pitch-val">+0.0 st</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">Volume</span>
          <input type="range" id="volume" min="0.1" max="3.0" step="0.1" value="1.0"
                 oninput="updateSlider('volume','volume-val',v=>v.toFixed(1)+'×')" />
          <span class="slider-value" id="volume-val">1.0×</span>
        </div>
      </div>

      <!-- Generate -->
      <button id="btn" onclick="announce()">Generate Announcement</button>

      <!-- Output -->
      <div class="status" id="status">
        <span class="spinner" id="spinner" style="display:none"></span>
        <span id="status-text"></span>
      </div>

      <div class="text-preview" id="preview">
        <strong>Spoken text</strong>
        <span id="preview-text"></span>
      </div>

      <div class="player-wrap" id="player-wrap">
        <div class="player-label">Audio Output — plays automatically</div>
        <audio id="audio-player" controls></audio>
      </div>

    </div>

    <script>
      // ── Section toggle ────────────────────────────────────────────────────────
      function toggleSection(name) {
        const panel   = document.getElementById(name + '-panel');
        const chevron = document.getElementById(name + '-chevron');
        const open    = panel.classList.toggle('open');
        chevron.classList.toggle('open', open);
      }

      // ── Slider display ────────────────────────────────────────────────────────
      function updateSlider(inputId, labelId, fmt) {
        document.getElementById(labelId).textContent =
          fmt(parseFloat(document.getElementById(inputId).value));
      }

      function resetProsody() {
        document.getElementById('speed').value  = 1.0;
        document.getElementById('pitch').value  = 0;
        document.getElementById('volume').value = 1.0;
        document.getElementById('speed-val').textContent  = '1.00×';
        document.getElementById('pitch-val').textContent  = '+0.0 st';
        document.getElementById('volume-val').textContent = '1.0×';
      }

      // ── Gender filter ─────────────────────────────────────────────────────────
      function filterVoices(gender, btn) {
        document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.voice-card').forEach(card => {
          card.style.display =
            (gender === 'all' || card.dataset.gender === gender) ? '' : 'none';
        });
      }

      // ── Voice selection ───────────────────────────────────────────────────────
      function selectVoice(card) {
        document.querySelectorAll('.voice-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        document.getElementById('selected-voice-id').value        = card.dataset.id;
        document.getElementById('selected-voice-name').textContent = card.dataset.name;
      }

      // ── Voice preview ─────────────────────────────────────────────────────────
      let _previewAudio = null;

      async function previewVoice(event, voiceId) {
        event.stopPropagation();
        const lang = document.getElementById('language').value;
        const btn  = event.currentTarget;

        // Stop any currently playing preview
        if (_previewAudio) {
          _previewAudio.pause();
          _previewAudio = null;
        }
        document.querySelectorAll('.vc-preview.playing').forEach(b => {
          b.classList.remove('playing');
          b.textContent = '▶ Play';
          b.disabled = false;
        });

        btn.disabled    = true;
        btn.textContent = '…';

        try {
          const res = await fetch('/api/v1/tts/preview-voice', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ voice_id: voiceId, language: lang }),
          });
          if (!res.ok) throw new Error('Preview failed');

          const blob = await res.blob();
          const url  = URL.createObjectURL(blob);
          _previewAudio = new Audio(url);
          _previewAudio.onended = () => {
            URL.revokeObjectURL(url);
            btn.classList.remove('playing');
            btn.textContent = '▶ Play';
            btn.disabled    = false;
            _previewAudio   = null;
          };
          btn.classList.add('playing');
          btn.textContent = '▶ Playing';
          btn.disabled    = false;
          await _previewAudio.play();
        } catch (_) {
          btn.textContent = '▶ Play';
          btn.disabled    = false;
        }
      }

      // ── Load voices from API ──────────────────────────────────────────────────
      async function loadVoices() {
        const grid = document.getElementById('voice-grid');
        try {
          const res = await fetch('/api/v1/voices');
          if (!res.ok) throw new Error('API error');
          const data = await res.json();

          if (!data.voices || data.voices.length === 0) {
            grid.innerHTML =
              '<div class="voice-empty">No voices available.<br>Set TTS_USE_XTTS=true and restart.</div>';
            return;
          }

          grid.innerHTML = '';
          data.voices.forEach((v, i) => {
            const glyph  = v.gender === 'female' ? '♀' : v.gender === 'male' ? '♂' : '○';
            const gClass = v.gender === 'female' ? 'female' : v.gender === 'male' ? 'male' : '';
            const isFirst = i === 0;
            const safeId  = v.voice_id.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

            const card = document.createElement('div');
            card.className      = 'voice-card' + (isFirst ? ' selected' : '');
            card.dataset.id     = v.voice_id;
            card.dataset.name   = v.name || v.voice_id;
            card.dataset.gender = v.gender || 'other';
            card.onclick        = () => selectVoice(card);
            card.innerHTML =
              `<div class="vc-top">` +
                `<span class="vc-gender-icon ${gClass}">${glyph}</span>` +
                `<span class="vc-name">${v.name || v.voice_id}</span>` +
              `</div>` +
              `<button class="vc-preview" onclick="previewVoice(event,'${safeId}')">▶ Play</button>`;
            grid.appendChild(card);
          });

          // Pre-select first (or marked default) voice
          const defaultCard =
            grid.querySelector('.voice-card.selected') || grid.querySelector('.voice-card');
          if (defaultCard) {
            document.getElementById('selected-voice-id').value        = defaultCard.dataset.id;
            document.getElementById('selected-voice-name').textContent = defaultCard.dataset.name;
          }
        } catch (_) {
          grid.innerHTML =
            '<div class="voice-empty">Could not load voices — server may not be running.</div>';
        }
      }

      // ── Language change ───────────────────────────────────────────────────────
      function onLanguageChange() {
        if (_previewAudio) { _previewAudio.pause(); _previewAudio = null; }
        document.querySelectorAll('.vc-preview').forEach(b => {
          b.classList.remove('playing');
          b.textContent = '▶ Play';
          b.disabled    = false;
        });
      }

      // ── Generate announcement ─────────────────────────────────────────────────
      async function announce() {
        const token   = document.getElementById('token').value.trim();
        const counter = document.getElementById('counter').value.trim();
        const lang    = document.getElementById('language').value;

        if (!token || !counter) {
          setStatus('error', 'Please fill in both Token and Counter fields.');
          return;
        }

        const speed   = parseFloat(document.getElementById('speed').value);
        const pitch   = parseFloat(document.getElementById('pitch').value);
        const volume  = parseFloat(document.getElementById('volume').value);
        const voiceId = document.getElementById('selected-voice-id').value || null;

        setStatus('loading', 'Synthesizing speech…');
        setPlayer(false);
        setPreview(false);
        document.getElementById('btn').disabled = true;

        try {
          const res = await fetch('/api/v1/announcements', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token_number:   token,
              counter_number: counter,
              language:       lang,
              prosody: { speed, pitch, volume, voice_id: voiceId },
            }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || res.statusText);
          }

          const spokenText = res.headers.get('X-Announcement-Text');
          const duration   = res.headers.get('X-Audio-Duration');
          if (spokenText) setPreview(true, spokenText);

          const blob   = await res.blob();
          const url    = URL.createObjectURL(blob);
          const player = document.getElementById('audio-player');
          if (player.dataset.prevUrl) URL.revokeObjectURL(player.dataset.prevUrl);
          player.dataset.prevUrl = url;
          player.src = url;

          setPlayer(true);
          setStatus('success',
            `Ready — ${duration ? parseFloat(duration).toFixed(1) + 's' : ''} audio generated.`);
          try { await player.play(); } catch (_) { /* autoplay blocked */ }
        } catch (err) {
          setStatus('error', err.message);
        } finally {
          document.getElementById('btn').disabled = false;
        }
      }

      // ── Helpers ───────────────────────────────────────────────────────────────
      function setStatus(type, msg) {
        const el = document.getElementById('status');
        el.className = `status show ${type}`;
        document.getElementById('spinner').style.display =
          type === 'loading' ? 'block' : 'none';
        document.getElementById('status-text').textContent = msg;
      }
      function setPlayer(show) {
        document.getElementById('player-wrap').className =
          show ? 'player-wrap show' : 'player-wrap';
      }
      function setPreview(show, text = '') {
        document.getElementById('preview').className =
          show ? 'text-preview show' : 'text-preview';
        document.getElementById('preview-text').textContent = text;
      }

      document.addEventListener('keydown', e => { if (e.key === 'Enter') announce(); });
      loadVoices();
    </script>
  </body>
</html>
