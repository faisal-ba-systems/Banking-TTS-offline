<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banking TTS — Announcement System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 60px rgba(0,0,0,.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .logo-sub  { font-size: 11px; color: #64748b; letter-spacing: .5px; text-transform: uppercase; }

    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: #f1f5f9;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 18px;
    }
    input:focus, select:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; }
    select option { background: #1e293b; }

    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }
    button:hover:not(:disabled) { opacity: .9; }
    button:active:not(:disabled) { transform: scale(.98); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    /* Status bar */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 22px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      min-height: 44px;
      transition: background .3s;
      visibility: hidden;
    }
    .status.show { visibility: visible; }
    .status.loading { background: #1e3a5f; color: #93c5fd; }
    .status.success { background: #14532d; color: #86efac; }
    .status.error   { background: #450a0a; color: #fca5a5; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Audio player */
    .player-wrap {
      margin-top: 18px;
      display: none;
    }
    .player-wrap.show { display: block; }
    .player-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    audio {
      width: 100%;
      border-radius: 8px;
      accent-color: #3b82f6;
    }

    /* Announcement text preview */
    .text-preview {
      margin-top: 14px;
      padding: 12px 14px;
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.5;
      display: none;
    }
    .text-preview.show { display: block; }
    .text-preview strong { display: block; font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔊</div>
    <div>
      <div class="logo-text">Banking TTS</div>
      <div class="logo-sub">Offline Announcement System</div>
    </div>
  </div>

  <h1>Queue Announcement</h1>
  <p class="subtitle">Enter a token and counter number to generate a spoken announcement.</p>

  <div class="row">
    <div>
      <label for="token">Token Number</label>
      <input id="token" type="text" placeholder="e.g. A13" maxlength="20" />
    </div>
    <div>
      <label for="counter">Counter Number</label>
      <input id="counter" type="text" placeholder="e.g. 23" maxlength="10" />
    </div>
  </div>

  <label for="language">Language</label>
  <select id="language">
    <option value="en">🇬🇧  English</option>
    <option value="es">🇪🇸  Spanish</option>
    <option value="ar">🇸🇦  Arabic</option>
    <option value="zh">🇨🇳  Chinese</option>
    <option value="ja">🇯🇵  Japanese</option>
    <option value="fr">🇫🇷  French</option>
  </select>

  <button id="btn" onclick="announce()">Generate Announcement</button>

  <div class="status" id="status">
    <span class="spinner" id="spinner" style="display:none"></span>
    <span id="status-text"></span>
  </div>

  <div class="text-preview" id="preview">
    <strong>Spoken text</strong>
    <span id="preview-text"></span>
  </div>

  <div class="player-wrap" id="player-wrap">
    <div class="player-label">Audio Output — plays automatically</div>
    <audio id="audio-player" controls></audio>
  </div>
</div>

<script>
  async function announce() {
    const token   = document.getElementById('token').value.trim();
    const counter = document.getElementById('counter').value.trim();
    const lang    = document.getElementById('language').value;

    if (!token || !counter) {
      setStatus('error', 'Please fill in both Token and Counter fields.');
      return;
    }

    setStatus('loading', 'Synthesizing speech…');
    setPlayer(false);
    setPreview(false);
    document.getElementById('btn').disabled = true;

    try {
      const res = await fetch('/api/v1/announcements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token_number:   token,
          counter_number: counter,
          language:       lang,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }

      // Show spoken text from response header
      const spokenText = res.headers.get('X-Announcement-Text');
      const duration   = res.headers.get('X-Audio-Duration');
      if (spokenText) setPreview(true, spokenText);

      // Convert response body → object URL → play
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const player = document.getElementById('audio-player');

      // Revoke previous object URL to free memory
      if (player.dataset.prevUrl) URL.revokeObjectURL(player.dataset.prevUrl);
      player.dataset.prevUrl = url;
      player.src = url;

      setPlayer(true);
      setStatus('success', `Ready — ${duration ? parseFloat(duration).toFixed(1) + 's' : ''} audio generated.`);

      // Auto-play
      try { await player.play(); } catch (_) { /* autoplay blocked by browser */ }

    } catch (err) {
      setStatus('error', err.message);
    } finally {
      document.getElementById('btn').disabled = false;
    }
  }

  function setStatus(type, msg) {
    const el      = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const text    = document.getElementById('status-text');
    el.className  = `status show ${type}`;
    spinner.style.display = type === 'loading' ? 'block' : 'none';
    text.textContent = msg;
  }

  function setPlayer(show) {
    document.getElementById('player-wrap').className = show ? 'player-wrap show' : 'player-wrap';
  }

  function setPreview(show, text = '') {
    const el = document.getElementById('preview');
    el.className = show ? 'text-preview show' : 'text-preview';
    document.getElementById('preview-text').textContent = text;
  }

  // Submit on Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') announce();
  });
</script>
</body>
</html>
